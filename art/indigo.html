  <h1>Indigo Dye Production</h1>
  <div class="meta">Berkeley, 2025</div>

<section class="description">
  <p>For a long time after seeing <a href="https://www.thomasthwaites.com/the-toaster-project/">The Toaster Project</a>, I wanted to make something from scratch. Over one season, I grew 3 strains of indigo from seed and processed the leaves into dye.</p>
